[package]
name = "scirust-trading-monitor"
version = "0.1.0"
edition = "2021"

[dependencies]
scirust-trading-core = { path = "../scirust-trading-core" }
scirust-trading-engine = { path = "../scirust-trading-engine" }
scirust-trading-persistence = { path = "../scirust-trading-persistence" }
tokio = { version = "1", features = ["sync", "macros", "rt", "rt-multi-thread", "time"] }
axum = { version = "0.7", features = ["tokio"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tower = { version = "0.4", features = ["util"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
thiserror = "2"
futures = "0.3"
