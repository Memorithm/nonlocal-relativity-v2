[package]
name = "scirust-trading-news"
version = "0.1.0"
edition = "2021"

[dependencies]
scirust-trading-core = { path = "../scirust-trading-core" }
tokio = { version = "1", features = ["sync", "macros", "rt", "rt-multi-thread", "time"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
regex = "1"
async-trait = "0.1"
toml = "0.8"
quick-xml = "0.36"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
