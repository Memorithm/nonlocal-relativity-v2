[package]
name = "scirust-trader"
version = "0.1.0"
edition = "2021"
publish = false
description = "SciRust auditable crypto-trading pipeline — certified predictions, LLM narration, proof-sealed decisions"

[dependencies]
scirust-core = { path = "../scirust-core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.13.4", default-features = false, features = ["json", "blocking", "default-tls"] }

[features]
default = []
network-tests = []
