# deny.toml — cargo-deny configuration for SciRust (validated with cargo-deny 0.19)
#
# The workspace crates themselves are source-available under
# PolyForm Noncommercial 1.0.0 (see LICENSE.md) and are not published to
# crates.io (`publish = false`), so the license check below covers
# third-party dependencies only.

[graph]
all-features = false

[advisories]
ignore = [
    # Unmaintained notice, not a vulnerability: `paste` is pulled in via
    # nalgebra -> simba and has no upstream replacement yet
    # (https://rustsec.org/advisories/RUSTSEC-2024-0436).
    { id = "RUSTSEC-2024-0436", reason = "paste unmaintained; transitively required by nalgebra/simba, no safe upgrade available" },
    # Unmaintained notice, not a vulnerability: this is pulled in only by the
    # optional Intel MKL source package and the advisory lists no safe upgrade.
    { id = "RUSTSEC-2026-0173", reason = "proc-macro-error2 unmaintained; transitively required by intel-mkl-src, no safe upgrade available" },
]

[licenses]
# Exactly the permissive licenses present in the dependency tree
# (cargo-deny warns on unused allowances, so keep this list tight).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT-0",
    "CDLA-Permissive-2.0",
    "CC0-1.0",
    "MPL-2.0",
    "Zlib",
    "Unicode-3.0",
    "PolyForm-Noncommercial-1.0.0",
]
confidence-threshold = 0.8
exceptions = [
    { allow = ["LicenseRef-Intel-Simplified-Software-License"], crate = "intel-mkl-src@0.8.1" },
]
# Workspace members are unpublished; skip license checks for them.
private = { ignore = true }

# intel-mkl-src ships its license in a non-SPDX license-file field. Pin the
# reviewed Intel Simplified Software License text so an upstream change fails
# closed instead of silently inheriting this clarification.
[[licenses.clarify]]
crate = "intel-mkl-src@0.8.1"
expression = "LicenseRef-Intel-Simplified-Software-License"
license-files = [
    { path = "License.txt", hash = 0x3bf8c2d0 },
]

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
