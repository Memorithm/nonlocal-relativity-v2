[package]
name = "scirust-trading-engine"
version = "0.1.0"
edition = "2021"

[dependencies]
scirust-trading-core = { path = "../scirust-trading-core" }
tokio = { version = "1", features = ["sync", "macros", "rt", "rt-multi-thread", "time"] }
async-trait = "0.1"
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
