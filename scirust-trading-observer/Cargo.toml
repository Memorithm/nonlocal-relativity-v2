[package]
name = "scirust-trading-observer"
version = "0.1.0"
edition = "2021"

[dependencies]
scirust-trading-core = { path = "../scirust-trading-core" }
tokio = { version = "1", features = ["sync", "macros", "rt", "rt-multi-thread", "time", "process"] }
async-trait = "0.1"
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio-tungstenite = "0.21"
futures-util = "0.3"
thiserror = "2"
